<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pawxel — Build Your Cat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap');
:root{
  --bg:#0f0f12;--surface:#17171c;--surface2:#1e1e25;
  --border:#2a2a35;--accent:#ff7043;--accent2:#ffb347;
  --text:#eeeae4;--muted:#6b6b7e;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

header{height:52px;padding:0 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:16px;flex-shrink:0;}
.logo{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);}
.logo span{color:var(--accent2);}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.prog-wrap{display:flex;align-items:center;gap:8px;}
.prog-bar{width:100px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .3s;width:0%;}
.prog-txt{font-family:'Space Mono',monospace;font-size:12px;color:var(--accent2);}
.btn{padding:5px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:5px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn:hover{border-color:var(--accent);color:var(--accent);}

.main{flex:1;display:flex;overflow:hidden;}

/* 왼쪽 파츠 패널 */
.parts-panel{width:200px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.panel-title{padding:12px 14px 8px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);border-bottom:1px solid var(--border);flex-shrink:0;}
.parts-list{flex:1;overflow-y:auto;padding:8px;}
.parts-list::-webkit-scrollbar{width:3px;}
.parts-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.part-card{
  padding:10px 10px;border-radius:8px;border:1.5px solid var(--border);
  margin-bottom:6px;cursor:grab;transition:all .15s;
  display:flex;align-items:center;gap:10px;
  user-select:none;
}
.part-card:hover{border-color:rgba(255,112,67,.5);background:var(--surface2);}
.part-card.placed{opacity:.4;cursor:default;pointer-events:none;}
.part-card.dragging-src{opacity:.3;}

.part-swatch{width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.part-info{flex:1;min-width:0;}
.part-name{font-size:13px;font-weight:500;}
.part-blocks{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;}
.part-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .2s;}
.part-check.done{background:#4dde80;border-color:#4dde80;color:#000;}

.panel-hint{padding:10px 12px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);line-height:1.7;flex-shrink:0;}
.kbd{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0 4px;font-family:'Space Mono',monospace;font-size:9px;color:var(--text);}

/* 3D 씬 */
#cv-wrap{flex:1;position:relative;overflow:hidden;}
canvas{display:block;width:100%;height:100%;cursor:crosshair;}
canvas.rotating{cursor:grabbing;}
canvas.can-drop{cursor:copy;}

.scene-tip{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(255,112,67,.12);border:1px solid rgba(255,112,67,.35);padding:5px 16px;border-radius:16px;font-size:12px;color:var(--accent2);pointer-events:none;white-space:nowrap;transition:opacity .3s;}
.scene-tip.hide{opacity:0;}

.ctrl-hint{position:absolute;bottom:14px;right:14px;font-size:10px;color:var(--muted);text-align:right;line-height:2;pointer-events:none;}

/* 완성 오버레이 */
.overlay{position:absolute;inset:0;background:rgba(15,15,18,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:0;pointer-events:none;transition:opacity .5s;backdrop-filter:blur(6px);}
.overlay.show{opacity:1;pointer-events:all;}
.ov-emoji{font-size:64px;}
.ov-title{font-family:'Space Mono',monospace;font-size:32px;font-weight:700;color:var(--accent2);}
.ov-sub{font-size:14px;color:var(--muted);}
.btn-primary{padding:10px 28px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;margin-top:4px;}
.btn-primary:hover{background:var(--accent2);transform:scale(1.03);}

/* 드래그 고스트 */
#drag-ghost{
  position:fixed;pointer-events:none;z-index:9999;
  font-size:28px;opacity:.85;transform:translate(-50%,-50%);
  display:none;
}
</style>
</head>
<body>

<header>
  <div class="logo">Paw<span>xel</span></div>
  <div style="width:1px;height:20px;background:var(--border)"></div>
  <span style="font-size:13px;font-weight:500">Tabby Cat</span>
  <div class="hdr-right">
    <div class="prog-wrap">
      <span style="font-size:11px;color:var(--muted)">Progress</span>
      <div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
      <span class="prog-txt" id="ptxt">0 / 0</span>
    </div>
    <button class="btn" id="btn-reset">Reset</button>
  </div>
</header>

<div class="main">
  <div class="parts-panel">
    <div class="panel-title">Parts</div>
    <div class="parts-list" id="parts-list"></div>
    <div class="panel-hint">
      <span class="kbd">drag</span> part onto the scene<br>
      <span class="kbd">drag</span> scene to rotate<br>
      <span class="kbd">scroll</span> to zoom
    </div>
  </div>

  <div id="cv-wrap">
    <canvas id="cv"></canvas>
    <div class="scene-tip" id="tip">Drag a part from the left panel onto the scene 🐱</div>
    <div class="ctrl-hint">
      <span class="kbd">drag</span> rotate &nbsp;
      <span class="kbd">scroll</span> zoom
    </div>
    <div class="overlay" id="ov">
      <div class="ov-emoji">🐱</div>
      <div class="ov-title">Complete!</div>
      <div class="ov-sub">Your Tabby Cat is built!</div>
      <button class="btn-primary" id="btn-share">Share on X →</button>
      <button class="btn" id="btn-again" style="margin-top:4px">Build Again</button>
    </div>
  </div>
</div>

<div id="drag-ghost"></div>

<script>
(function(){
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
  s.onload=initApp;
  s.onerror=function(){ alert('Failed to load Three.js. Check your internet.'); };
  document.head.appendChild(s);
})();

function initApp(){

// ── 파츠 정의 ──
// 각 파츠는 색상 + 블록 좌표 배열 [x,y,z]
var PARTS = [
  {
    id:'body', name:'Body', emoji:'🟧', color:0xE8834A, colorHex:'#E8834A',
    blocks:[
      [1,2,0],[2,2,0],[3,2,0],[4,2,0],[5,2,0],[6,2,0],
      [1,3,0],[2,3,0],[3,3,0],[4,3,0],[5,3,0],[6,3,0],
      [1,4,0],[2,4,0],[3,4,0],[4,4,0],[5,4,0],[6,4,0],
      [1,2,1],[2,2,1],[3,2,1],[4,2,1],[5,2,1],[6,2,1],
      [1,3,1],[2,3,1],[3,3,1],[4,3,1],[5,3,1],[6,3,1],
      [1,4,1],[2,4,1],[3,4,1],[4,4,1],[5,4,1],[6,4,1],
      [1,2,2],[2,2,2],[3,2,2],[4,2,2],[5,2,2],[6,2,2],
      [1,3,2],[2,3,2],[3,3,2],[4,3,2],[5,3,2],[6,3,2],
      [1,4,2],[2,4,2],[3,4,2],[4,4,2],[5,4,2],[6,4,2],
    ]
  },
  {
    id:'head', name:'Head', emoji:'🟫', color:0xD4753A, colorHex:'#D4753A',
    blocks:[
      [2,5,0],[3,5,0],[4,5,0],[5,5,0],
      [2,6,0],[3,6,0],[4,6,0],[5,6,0],
      [2,7,0],[3,7,0],[4,7,0],[5,7,0],
      [2,5,1],[3,5,1],[4,5,1],[5,5,1],
      [2,6,1],[3,6,1],[4,6,1],[5,6,1],
      [2,7,1],[3,7,1],[4,7,1],[5,7,1],
      [2,5,2],[3,5,2],[4,5,2],[5,5,2],
      [2,6,2],[3,6,2],[4,6,2],[5,6,2],
      [2,7,2],[3,7,2],[4,7,2],[5,7,2],
    ]
  },
  {
    id:'ears', name:'Ears', emoji:'🔺', color:0xC05830, colorHex:'#C05830',
    blocks:[
      [2,8,0],[5,8,0],[2,8,1],[5,8,1],[2,8,2],[5,8,2],
      [2,9,0],[5,9,0],[2,9,1],[5,9,1],[2,9,2],[5,9,2],
    ]
  },
  {
    id:'legs', name:'Legs', emoji:'🟥', color:0xBF6535, colorHex:'#BF6535',
    blocks:[
      [1,0,0],[2,0,0],[1,1,0],[2,1,0],
      [5,0,0],[6,0,0],[5,1,0],[6,1,0],
      [1,0,1],[2,0,1],[1,1,1],[2,1,1],
      [5,0,1],[6,0,1],[5,1,1],[6,1,1],
      [1,0,2],[2,0,2],[1,1,2],[2,1,2],
      [5,0,2],[6,0,2],[5,1,2],[6,1,2],
    ]
  },
  {
    id:'tail', name:'Tail', emoji:'🌀', color:0xD4894E, colorHex:'#D4894E',
    blocks:[
      [7,2,1],[7,3,1],[7,2,2],[7,3,2],
      [8,4,1],[8,4,2],
    ]
  },
  {
    id:'face', name:'Face', emoji:'👁', color:0x2a1a0e, colorHex:'#2a1a0e',
    blocks:[
      [2,7,0],[5,7,0],[2,7,2],[5,7,2], // eyes
      [3,6,0],[4,6,0],[3,6,2],[4,6,2], // nose strip
    ]
  },
];

var TOTAL_PARTS = PARTS.length;
var placedSet = {};  // partId -> true
var partMeshes = {}; // partId -> [mesh, ...]
var ghostMeshes = {}; // partId -> [mesh, ...]

// ── Three.js 씬 ──
var wrap = document.getElementById('cv-wrap');
var canvas = document.getElementById('cv');
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f0f12);
scene.fog = new THREE.Fog(0x0f0f12, 32, 60);

var camera = new THREE.PerspectiveCamera(42, wrap.clientWidth/wrap.clientHeight, 0.1, 100);
var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true});
renderer.setSize(wrap.clientWidth, wrap.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;

// 조명
scene.add(new THREE.AmbientLight(0xffeedd, 0.6));
var sun = new THREE.DirectionalLight(0xfff4e0, 1.3);
sun.position.set(8, 14, 10); sun.castShadow=true;
scene.add(sun);
var fill = new THREE.DirectionalLight(0x3a4a7a, 0.4);
fill.position.set(-6,4,-6);
scene.add(fill);
var rim = new THREE.DirectionalLight(0xff9966, 0.2);
rim.position.set(0,2,-10);
scene.add(rim);

// 그리드
var gridH = new THREE.GridHelper(28,28,0x1e1e28,0x181820);
gridH.position.set(4,-0.55,1);
scene.add(gridH);

// 카메라
var sph = {theta:0.5, phi:0.78, r:22};
var tgt = new THREE.Vector3(4, 4.5, 1);
function updateCam(){
  camera.position.set(
    tgt.x + sph.r*Math.sin(sph.phi)*Math.sin(sph.theta),
    tgt.y + sph.r*Math.cos(sph.phi),
    tgt.z + sph.r*Math.sin(sph.phi)*Math.cos(sph.theta)
  );
  camera.lookAt(tgt);
}
updateCam();

// ── 블록 메시 유틸 ──
function makeBlock(x, y, z, color, opacity, isGhost){
  var geo = new THREE.BoxGeometry(0.92,0.92,0.92);
  var mat = new THREE.MeshStandardMaterial({
    color: color,
    transparent: isGhost,
    opacity: isGhost ? opacity : 1.0,
    depthWrite: !isGhost
  });
  var mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  if (!isGhost){ mesh.castShadow=true; mesh.receiveShadow=true; }

  var eGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(0.92,0.92,0.92));
  var eMat = new THREE.LineBasicMaterial({
    color: isGhost ? color : 0x000000,
    transparent: true,
    opacity: isGhost ? opacity*1.5 : 0.18
  });
  mesh.add(new THREE.LineSegments(eGeo, eMat));
  return mesh;
}

// ── 고스트(윤곽선) 블록 생성 — 처음부터 전체 보이게 ──
function buildGhosts(){
  for(var i=0;i<PARTS.length;i++){
    var part = PARTS[i];
    ghostMeshes[part.id] = [];
    for(var j=0;j<part.blocks.length;j++){
      var b = part.blocks[j];
      var m = makeBlock(b[0],b[1],b[2], part.color, 0.13, true);
      scene.add(m);
      ghostMeshes[part.id].push(m);
    }
  }
}
buildGhosts();

// ── 파츠 배치 ──
function placePart(partId){
  if(placedSet[partId]) return;
  placedSet[partId] = true;

  // ghost 제거
  var ghosts = ghostMeshes[partId];
  if(ghosts){ for(var i=0;i<ghosts.length;i++) scene.remove(ghosts[i]); }

  // 실제 블록 추가
  var part = null;
  for(var i=0;i<PARTS.length;i++) if(PARTS[i].id===partId){ part=PARTS[i]; break; }
  if(!part) return;

  partMeshes[partId] = [];
  for(var j=0;j<part.blocks.length;j++){
    var b = part.blocks[j];
    var m = makeBlock(b[0],b[1],b[2], part.color, 1.0, false);
    scene.add(m);
    partMeshes[partId].push(m);
  }

  updateUI();

  // 완성 체크
  var count = 0;
  for(var k in placedSet) if(placedSet[k]) count++;
  if(count === TOTAL_PARTS){
    setTimeout(function(){ document.getElementById('ov').classList.add('show'); }, 400);
  }
}

// ── UI 렌더링 ──
function buildPartsList(){
  var list = document.getElementById('parts-list');
  list.innerHTML = '';
  for(var i=0;i<PARTS.length;i++){
    var part = PARTS[i];
    var done = !!placedSet[part.id];
    var card = document.createElement('div');
    card.className = 'part-card' + (done?' placed':'');
    card.dataset.id = part.id;
    if(!done){
      card.draggable = true;
      card.addEventListener('dragstart', onDragStart);
      card.addEventListener('dragend', onDragEnd);
    }
    card.innerHTML =
      '<div class="part-swatch" style="background:'+part.colorHex+'22;border:1px solid '+part.colorHex+'55">'+part.emoji+'</div>'+
      '<div class="part-info">'+
        '<div class="part-name">'+part.name+'</div>'+
        '<div class="part-blocks">'+part.blocks.length+' blocks</div>'+
      '</div>'+
      '<div class="part-check'+(done?' done':'')+'">'+( done?'✓':'' )+'</div>';
    list.appendChild(card);
  }
}

function updateUI(){
  var done = 0;
  for(var k in placedSet) if(placedSet[k]) done++;
  document.getElementById('pf').style.width = (done/TOTAL_PARTS*100)+'%';
  document.getElementById('ptxt').textContent = done+' / '+TOTAL_PARTS;
  buildPartsList();
}

// ── 드래그 앤 드롭 ──
var draggingId = null;
var ghost = document.getElementById('drag-ghost');

function onDragStart(e){
  draggingId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging-src');

  // 파츠 이모지 찾기
  var part = null;
  for(var i=0;i<PARTS.length;i++) if(PARTS[i].id===draggingId){ part=PARTS[i]; break; }

  ghost.textContent = part ? part.emoji : '📦';
  ghost.style.display = 'block';

  // 기본 drag image 숨기기
  var empty = document.createElement('canvas');
  e.dataTransfer.setDragImage(empty,0,0);
  e.dataTransfer.effectAllowed = 'copy';

  showTip('"'+part.name+'" selected — drop it on the 3D scene!');
}

function onDragEnd(e){
  e.currentTarget.classList.remove('dragging-src');
  ghost.style.display = 'none';
}

document.addEventListener('dragover', function(e){
  e.preventDefault();
  ghost.style.left = e.clientX+'px';
  ghost.style.top  = e.clientY+'px';
});

// 씬 드롭 감지
var cvWrap = document.getElementById('cv-wrap');
cvWrap.addEventListener('dragover', function(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
  canvas.classList.add('can-drop');
});
cvWrap.addEventListener('dragleave', function(){
  canvas.classList.remove('can-drop');
});
cvWrap.addEventListener('drop', function(e){
  e.preventDefault();
  canvas.classList.remove('can-drop');
  ghost.style.display='none';
  if(draggingId && !placedSet[draggingId]){
    placePart(draggingId);
    showTip('Nice! Keep building 🐱');
  }
  draggingId = null;
});

// 파츠 카드 클릭으로도 배치 가능 (터치 대비)
document.getElementById('parts-list').addEventListener('click', function(e){
  var card = e.target.closest('.part-card');
  if(!card) return;
  var id = card.dataset.id;
  if(id && !placedSet[id]){
    placePart(id);
    showTip('Placed! 🐱');
  }
});

// ── 팁 ──
function showTip(msg){
  var el = document.getElementById('tip');
  el.textContent = msg;
  el.classList.remove('hide');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.add('hide'); }, 2800);
}

// ── 카메라 컨트롤 ──
var isRot=false, didDrag=false, prevM={x:0,y:0};

canvas.addEventListener('mousedown', function(e){
  isRot=true; didDrag=false;
  prevM={x:e.clientX,y:e.clientY};
  canvas.classList.add('rotating');
});
window.addEventListener('mouseup', function(){
  isRot=false; canvas.classList.remove('rotating');
});
window.addEventListener('mousemove', function(e){
  if(!isRot) return;
  var dx=e.clientX-prevM.x, dy=e.clientY-prevM.y;
  if(Math.abs(dx)>2||Math.abs(dy)>2) didDrag=true;
  sph.theta -= dx*0.007;
  sph.phi = Math.max(0.12, Math.min(1.5, sph.phi+dy*0.007));
  prevM={x:e.clientX,y:e.clientY};
  updateCam();
});
canvas.addEventListener('wheel', function(e){
  sph.r = Math.max(8, Math.min(38, sph.r+e.deltaY*0.025));
  updateCam(); e.preventDefault();
},{passive:false});

// 터치 회전
var lastT=null;
canvas.addEventListener('touchstart',function(e){ lastT={x:e.touches[0].clientX,y:e.touches[0].clientY}; });
canvas.addEventListener('touchmove',function(e){
  if(!lastT) return;
  var dx=e.touches[0].clientX-lastT.x, dy=e.touches[0].clientY-lastT.y;
  sph.theta-=dx*0.009;
  sph.phi=Math.max(0.12,Math.min(1.5,sph.phi+dy*0.009));
  lastT={x:e.touches[0].clientX,y:e.touches[0].clientY};
  updateCam(); e.preventDefault();
},{passive:false});

// ── 리셋 ──
document.getElementById('btn-reset').addEventListener('click', function(){
  // 실제 블록 제거
  for(var id in partMeshes){
    var arr=partMeshes[id];
    for(var i=0;i<arr.length;i++) scene.remove(arr[i]);
    delete partMeshes[id];
  }
  for(var id in placedSet) delete placedSet[id];

  // ghost 재생성
  for(var id in ghostMeshes){
    var arr=ghostMeshes[id];
    for(var i=0;i<arr.length;i++) scene.remove(arr[i]);
    delete ghostMeshes[id];
  }
  buildGhosts();

  document.getElementById('ov').classList.remove('show');
  updateUI();
  showTip('Reset! Drag parts to build your cat 🐱');
});

document.getElementById('btn-again').addEventListener('click', function(){
  document.getElementById('btn-reset').click();
});
document.getElementById('btn-share').addEventListener('click', function(){
  var t=encodeURIComponent('Just built a Tabby Cat on Pawxel! 🐱 Try it: https://pawxel.pages.dev #Pawxel #voxel');
  window.open('https://twitter.com/intent/tweet?text='+t,'_blank');
});

// 리사이즈
window.addEventListener('resize',function(){
  var W=wrap.clientWidth,H=wrap.clientHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});

// 렌더 루프
function animate(){ requestAnimationFrame(animate); renderer.render(scene,camera); }
animate();

// 초기화
updateUI();
setTimeout(function(){ showTip('Drag a part from the left panel onto the scene 🐱'); },800);

} // end initApp
</script>
</body>
</html>
